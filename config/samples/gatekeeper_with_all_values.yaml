apiVersion: operator.gatekeeper.sh/v1alpha1
kind: Gatekeeper
metadata:
  name: gatekeeper
spec:
  image:
    image: docker.io/openpolicyagent/gatekeeper:v3.17.1
    imagePullPolicy: Always
  audit:
    replicas: 1
    logLevel: DEBUG
    auditInterval: 10s
    constraintViolationLimit: 55
    auditFromCache: Enabled
    auditChunkSize: 66
    emitAuditEvents: Enabled
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 20Mi
    containerArguments:
      - name: log-level
        value: INFO
      - name: enable-k8s-native-validation
    podAnnotations:
      audit.annotation: "audit-specific"
      monitoring.io/scrape: "false"
  validatingWebhook: Enabled
  mutatingWebhook: Enabled
  webhook:
    logDenies: Enabled
    replicas: 2
    logLevel: ERROR
    emitAdmissionEvents: Enabled
    timeoutSeconds: 10
    operations:
      - UPDATE
      - CREATE
      - DELETE
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: admission.gatekeeper.sh/enabled
          operator: Exists
    resources:
      limits:
        cpu: 100m
        memory: 256Mi
      requests:
        cpu: 100m
        memory: 20Mi
    disabledBuiltins:
      - http.send
    containerArguments:
      - name: log-level
        value: INFO
      - name: enable-k8s-native-validation
    podAnnotations:
      webhook.annotation: "webhook-specific"
      monitoring.io/scrape: "true"
  mutatingWebhookConfig:
    operations:
      - CREATE
    timeoutSeconds: 5
    failurePolicy: Ignore
    namespaceSelector:
      matchExpressions:
        - key: admission.gatekeeper.sh/enabled
          operator: Exists
    logMutations: Enabled
    mutationAnnotations: Enabled
  nodeSelector:
    region: "EMEA"
  affinity:
    podAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchLabels:
              auditKey: "auditValue"
          topologyKey: topology.kubernetes.io/zone
  tolerations:
    - key: "Example"
      operator: "Exists"
      effect: "NoSchedule"
  podAnnotations:
    global.annotation: "applied-to-all"
    monitoring.io/scrape: "true"
    some-annotation: "this is a test"
    other-annotation: "another test"
  config:
    matches:
      - excludedNamespaces: ["test-*", "my-namespace"]
        processes: ["*"]
    disableDefaultMatches: false
